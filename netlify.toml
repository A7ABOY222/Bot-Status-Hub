[build]
  command = "pnpm --filter @workspace/leveling-bot run build"
  publish = "artifacts/leveling-bot/dist/public"

[build.environment]
  NODE_VERSION = "24"
  PORT         = "3000"
  BASE_PATH    = "/"

# Proxy API calls to your hosted API server.
# Replace YOUR_API_URL with the URL where you deploy the API server.
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR_API_URL/api/:splat"
  status = 200
  force  = true

# SPA fallback — must come last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
